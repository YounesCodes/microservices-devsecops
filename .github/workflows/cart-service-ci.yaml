name: Cart Service Pipeline

on:
  push:
    paths:
      - 'src/cartservice/**'
      - '.github/workflows/cart-service-ci.yaml'

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/cartservice/

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore cartservice.sln

      - name: Build solution
        run: dotnet build cartservice.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test cartservice.sln --no-build --configuration Release

  build_and_push:
    runs-on: ubuntu-latest
    needs: test 
    steps:
      - uses: actions/checkout@v6
    
      - name: Build the Docker image
        run: docker build -f src/cartservice/src/Dockerfile -t ${{ secrets.DOCKER_USERNAME }}/ms-cart-service:latest src/cartservice/src

      - name: Log in to Docker Hub
        run:  echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      
      - name: Push the image
        run : docker push ${{ secrets.DOCKER_USERNAME }}/ms-cart-service:latest
