name: Shipping Service Pipeline

on:
  push:
    paths:
      - 'src/shippingservice/**'
      - '.github/workflows/shippingservice-ci.yaml'

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
    
      - name: Build the Docker image
        run: docker build -f src/shippingservice/Dockerfile -t ${{ secrets.DOCKER_USERNAME }}/ms-shipping-service:latest src/shippingservice

      - name: Log in to Docker Hub
        run:  echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      
      - name: Push the image
        run : docker push ${{ secrets.DOCKER_USERNAME }}/ms-shipping-service:latest